<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=portrait">
    <title>Scanner DNI - Simplificado v2</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* Prevenir zoom en orientación */
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .scanner-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Contenedor de cámara - Proporción real DNI (85.6mm x 53.98mm = 1.586:1) */
        .camera-container {
            width: 300px; /* Tamaño inicial para DNI */
            height: 189px; /* 300 / 1.586 = 189px */
            border: 2px solid #fff;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            position: relative;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        
        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            /* SIN transform: scaleX(-1) - Video normal para mejor UX */
            background: #000;
        }
        
        /* Canvas para captura sin inversión */
        #captureCanvas {
            display: none;
        }
        
        .camera-status {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 10px;
            z-index: 20;
        }
        
        /* Marco de guía - Proporción real DNI */
        .guide-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 270px; /* Ligeramente más pequeño que el contenedor */
            height: 170px; /* 270 / 1.586 = 170px */
            border: 3px solid #fff;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            background: rgba(255, 255, 255, 0.05);
            z-index: 10;
        }
        
        .guide-frame.detected {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5), 0 0 0 9999px rgba(0, 0, 0, 0.5);
            animation: pulse-green 2s infinite;
        }
        
        @keyframes pulse-green {
            0%, 100% { border-color: #4CAF50; }
            50% { border-color: #66BB6A; }
        }
        
        /* Indicadores de estado */
        .status-indicators {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 120px;
        }
        
        .status-item .icon {
            font-size: 16px;
        }
        
        .status-item .text {
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Instrucciones */
        .instructions {
            position: absolute;
            bottom: 140px; /* Más espacio desde abajo */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9); /* Más opacidad */
            color: white;
            padding: 15px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.4); /* Borde más visible */
            z-index: 20;
            transition: all 0.3s ease;
            max-width: 90%; /* Evitar que se salga de pantalla */
        }
        
        .instructions.detected {
            background: rgba(76, 175, 80, 0.9);
            border-color: #4CAF50;
        }
        
        /* Selector de documento */
        .document-selector {
            position: absolute;
            bottom: 100px; /* Más espacio desde abajo */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px; /* Más espacio entre botones */
            z-index: 20;
        }
        
        .doc-btn {
            padding: 10px 20px; /* Más padding */
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.8); /* Más opacidad */
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px; /* Ancho mínimo */
            text-align: center;
        }
        
        .doc-btn.active {
            background: rgba(76, 175, 80, 0.9);
            border-color: #4CAF50;
        }
        
        .doc-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Controles */
        .controls {
            position: absolute;
            bottom: 30px; /* Más espacio desde abajo para evitar superposición con navegación */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px; /* Más espacio entre botones */
            z-index: 20;
        }
        
        .controls button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 15px 20px; /* Más padding */
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 80px; /* Ancho mínimo */
            text-align: center;
        }
        
        .capture-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }
        
        .capture-btn:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .flip-btn {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
        
        .controls button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        /* Overlay general */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <!-- Contenedor de cámara -->
        <div class="camera-container">
            <video id="camera" autoplay muted playsinline></video>
            <canvas id="captureCanvas"></canvas>
            <div class="camera-status" id="cameraStatus">Iniciando...</div>
        </div>
        
        <!-- Overlay de guía -->
        <div class="overlay">
            <div class="guide-frame" id="guideFrame">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </div>
            
            <!-- Indicadores de estado -->
            <div class="status-indicators">
                <div class="status-item" id="positionStatus">
                    <span class="icon">📍</span>
                    <span class="text">Posición</span>
                </div>
                <div class="status-item" id="angleStatus">
                    <span class="icon">📐</span>
                    <span class="text">Ángulo</span>
                </div>
                <div class="status-item" id="lightingStatus">
                    <span class="icon">💡</span>
                    <span class="text">Luz</span>
                </div>
            </div>
            
            <!-- Instrucciones -->
            <div class="instructions" id="instructions">
                Coloca el DNI dentro del marco
            </div>
        </div>
        
        <!-- Selector de documento -->
        <div class="document-selector">
            <button id="dniBtn" class="doc-btn active">🆔 DNI</button>
            <button id="passportBtn" class="doc-btn">📘 Pasaporte</button>
        </div>
        
        <!-- Controles -->
        <div class="controls">
            <button id="captureBtn" class="capture-btn" disabled>📸 Capturar</button>
            <button id="flipBtn" class="flip-btn">🔄 Cambiar cámara</button>
        </div>
    </div>

    <script>
        class SimpleDNIScanner {
            constructor() {
                this.video = document.getElementById('camera');
                this.stream = null;
                this.currentFacingMode = 'environment';
                this.isInitialized = false;
                
                this.guideFrame = document.getElementById('guideFrame');
                this.instructions = document.getElementById('instructions');
                this.captureBtn = document.getElementById('captureBtn');
                this.flipBtn = document.getElementById('flipBtn');
                this.cameraStatus = document.getElementById('cameraStatus');
                
                this.dniBtn = document.getElementById('dniBtn');
                this.passportBtn = document.getElementById('passportBtn');
                this.currentDocumentType = 'dni';
                
                this.statusItems = {
                    position: document.getElementById('positionStatus'),
                    angle: document.getElementById('angleStatus'),
                    lighting: document.getElementById('lightingStatus')
                };
                
                this.setupEventListeners();
            }
            
            setupEventListeners() {
                this.captureBtn.addEventListener('click', () => this.captureImage());
                this.flipBtn.addEventListener('click', () => this.flipCamera());
                
                // Selector de documento
                this.dniBtn.addEventListener('click', () => this.setDocumentType('dni'));
                this.passportBtn.addEventListener('click', () => this.setDocumentType('passport'));
                
                // Detectar cambios de orientación
                window.addEventListener('orientationchange', () => {
                    setTimeout(() => this.handleOrientationChange(), 100);
                });
                
                // Detectar cambios de tamaño de ventana
                window.addEventListener('resize', () => {
                    setTimeout(() => this.handleOrientationChange(), 100);
                });
            }
            
            async initialize() {
                try {
                    console.log('Inicializando scanner simple...');
                    
                    const cameraReady = await this.initializeCamera();
                    if (!cameraReady) {
                        throw new Error('No se pudo inicializar la cámara');
                    }
                    
                    this.isInitialized = true;
                    console.log('Scanner simple inicializado correctamente');
                    
                    // Simular detección básica
                    this.startBasicDetection();
                    
                    return true;
                    
                } catch (error) {
                    console.error('Error inicializando scanner:', error);
                    this.showError(error.message);
                    return false;
                }
            }
            
            async initializeCamera() {
                try {
                    console.log('Iniciando cámara...');
                    this.updateCameraStatus('Solicitando permisos...');
                    
                    const constraints = {
                        video: {
                            facingMode: this.currentFacingMode,
                            width: { ideal: 640, min: 320 },
                            height: { ideal: 480, min: 240 },
                            // Forzar orientación correcta
                            resizeMode: 'crop-and-scale'
                        }
                    };
                    
                    // Intentar con la API moderna primero
                    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                        this.stream = await navigator.mediaDevices.getUserMedia(constraints);
                    } else {
                        // Fallback a API legacy
                        this.stream = await new Promise((resolve, reject) => {
                            const getUserMedia = navigator.getUserMedia || 
                                               navigator.webkitGetUserMedia || 
                                               navigator.mozGetUserMedia || 
                                               navigator.msGetUserMedia;
                            
                            if (!getUserMedia) {
                                reject(new Error('getUserMedia no soportado'));
                                return;
                            }
                            
                            getUserMedia.call(navigator, constraints, resolve, reject);
                        });
                    }
                    
                    this.video.srcObject = this.stream;
                    
                    // Esperar a que el video esté listo
                    await this.waitForVideoReady();
                    
                    this.updateCameraStatus('✅ Activa');
                    console.log('Cámara inicializada correctamente');
                    
                    return true;
                    
                } catch (error) {
                    console.error('Error inicializando cámara:', error);
                    this.updateCameraStatus('❌ Error');
                    this.showError(`Error de cámara: ${error.message}`);
                    return false;
                }
            }
            
            waitForVideoReady() {
                return new Promise((resolve) => {
                    if (this.video.readyState >= 2) {
                        resolve();
                    } else {
                        this.video.addEventListener('loadedmetadata', resolve, { once: true });
                    }
                });
            }
            
            updateCameraStatus(message) {
                this.cameraStatus.textContent = message;
                if (message.includes('✅')) {
                    this.cameraStatus.style.background = 'rgba(76, 175, 80, 0.8)';
                } else if (message.includes('❌')) {
                    this.cameraStatus.style.background = 'rgba(244, 67, 54, 0.8)';
                } else {
                    this.cameraStatus.style.background = 'rgba(255, 152, 0, 0.8)';
                }
            }
            
            startBasicDetection() {
                // Detección real usando Computer Vision
                this.detectionInterval = setInterval(() => {
                    this.analyzeFrame();
                }, 200); // Analizar cada 200ms
            }
            
            analyzeFrame() {
                if (!this.video || !this.video.videoWidth) return;
                
                // Crear canvas para análisis
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = this.video.videoWidth;
                canvas.height = this.video.videoHeight;
                
                // Capturar frame actual
                ctx.drawImage(this.video, 0, 0, canvas.width, canvas.height);
                
                // Obtener datos de imagen
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                // 1. ANÁLISIS DE ILUMINACIÓN
                const lighting = this.analyzeLighting(imageData);
                this.updateStatus('lighting', lighting.isGood, lighting.level);
                
                // 2. DETECCIÓN DE DOCUMENTO
                const document = this.detectDocument(imageData, canvas.width, canvas.height);
                
                if (document.found) {
                    this.showDocumentDetected(document);
                } else {
                    this.showNoDocument();
                }
            }
            
            analyzeLighting(imageData) {
                const data = imageData.data;
                let totalBrightness = 0;
                let pixelCount = 0;
                
                // Analizar cada 4 píxeles para optimizar
                for (let i = 0; i < data.length; i += 16) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    
                    // Convertir a escala de grises
                    const gray = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
                    totalBrightness += gray;
                    pixelCount++;
                }
                
                const averageBrightness = totalBrightness / pixelCount;
                
                let level, isGood;
                if (averageBrightness < 60) {
                    level = `Muy oscuro (${Math.round(averageBrightness)})`;
                    isGood = false;
                } else if (averageBrightness < 80) {
                    level = `Oscuro (${Math.round(averageBrightness)})`;
                    isGood = false;
                } else if (averageBrightness < 200) {
                    level = `Buena (${Math.round(averageBrightness)})`;
                    isGood = true;
                } else if (averageBrightness < 220) {
                    level = `Muy brillante (${Math.round(averageBrightness)})`;
                    isGood = false;
                } else {
                    level = `Demasiado brillante (${Math.round(averageBrightness)})`;
                    isGood = false;
                }
                
                return { level, isGood, averageBrightness };
            }
            
            detectDocument(imageData, width, height) {
                // 1. DETECCIÓN DE BORDES (Sobel)
                const edges = this.detectEdges(imageData, width, height);
                
                // 2. BUSCAR RECTÁNGULOS
                const rectangles = this.findRectangles(edges, width, height);
                
                // 3. FILTRAR POR PROPORCIONES DE DNI/PASAPORTE
                const validDocuments = rectangles.filter(rect => {
                    const aspectRatio = rect.width / rect.height;
                    // DNI: ~1.6, Pasaporte: ~1.4
                    return aspectRatio >= 1.3 && aspectRatio <= 1.8;
                });
                
                if (validDocuments.length > 0) {
                    // Tomar el rectángulo más grande y centrado
                    const best = validDocuments.reduce((best, current) => {
                        const currentScore = this.calculateDocumentScore(current, width, height);
                        const bestScore = this.calculateDocumentScore(best, width, height);
                        return currentScore > bestScore ? current : best;
                    });
                    
                    return {
                        found: true,
                        rectangle: best,
                        confidence: this.calculateDocumentScore(best, width, height),
                        position: this.checkPosition(best, width, height),
                        angle: this.checkAngle(best)
                    };
                }
                
                return { found: false };
            }
            
            detectEdges(imageData, width, height) {
                const data = imageData.data;
                const edges = new Uint8Array(width * height);
                
                // Kernel Sobel para detección de bordes
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const idx = (y * width + x) * 4;
                        
                        // Convertir a escala de grises
                        const gray = Math.round(0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2]);
                        
                        // Aplicar Sobel
                        const gx = this.getSobelX(data, x, y, width);
                        const gy = this.getSobelY(data, x, y, width);
                        const magnitude = Math.sqrt(gx * gx + gy * gy);
                        
                        edges[y * width + x] = Math.min(255, magnitude);
                    }
                }
                
                return edges;
            }
            
            getSobelX(data, x, y, width) {
                const idx = (y * width + x) * 4;
                const top = (y - 1) * width + x;
                const bottom = (y + 1) * width + x;
                
                const topGray = 0.299 * data[top * 4] + 0.587 * data[top * 4 + 1] + 0.114 * data[top * 4 + 2];
                const centerGray = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
                const bottomGray = 0.299 * data[bottom * 4] + 0.587 * data[bottom * 4 + 1] + 0.114 * data[bottom * 4 + 2];
                
                return (topGray + 2 * centerGray + bottomGray) * -1 + 
                       (topGray + 2 * centerGray + bottomGray) * 1;
            }
            
            getSobelY(data, x, y, width) {
                const idx = (y * width + x) * 4;
                const left = y * width + (x - 1);
                const right = y * width + (x + 1);
                
                const leftGray = 0.299 * data[left * 4] + 0.587 * data[left * 4 + 1] + 0.114 * data[left * 4 + 2];
                const centerGray = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
                const rightGray = 0.299 * data[right * 4] + 0.587 * data[right * 4 + 1] + 0.114 * data[right * 4 + 2];
                
                return (leftGray + 2 * centerGray + rightGray) * -1 + 
                       (leftGray + 2 * centerGray + rightGray) * 1;
            }
            
            findRectangles(edges, width, height) {
                // Implementación simplificada de detección de rectángulos
                // En una implementación real, usarías algoritmos como Hough Transform
                const rectangles = [];
                
                // Buscar contornos y aproximar a rectángulos
                const threshold = 50; // Umbral para bordes
                
                for (let y = 0; y < height - 100; y += 20) {
                    for (let x = 0; x < width - 100; x += 20) {
                        if (edges[y * width + x] > threshold) {
                            // Encontrar esquinas del rectángulo
                            const rect = this.findRectangleFromPoint(edges, x, y, width, height);
                            if (rect && rect.width > 50 && rect.height > 30) {
                                rectangles.push(rect);
                            }
                        }
                    }
                }
                
                return rectangles;
            }
            
            findRectangleFromPoint(edges, startX, startY, width, height) {
                // Implementación simplificada
                // En realidad, esto sería más complejo
                const rect = {
                    x: startX,
                    y: startY,
                    width: Math.min(200, width - startX),
                    height: Math.min(120, height - startY)
                };
                
                return rect;
            }
            
            calculateDocumentScore(rectangle, imageWidth, imageHeight) {
                let score = 0;
                
                // 1. Tamaño (más grande = mejor)
                const area = rectangle.width * rectangle.height;
                const imageArea = imageWidth * imageHeight;
                const sizeRatio = area / imageArea;
                score += sizeRatio * 40; // Máximo 40 puntos
                
                // 2. Centrado
                const centerX = imageWidth / 2;
                const centerY = imageHeight / 2;
                const rectCenterX = rectangle.x + rectangle.width / 2;
                const rectCenterY = rectangle.y + rectangle.height / 2;
                
                const distanceFromCenter = Math.sqrt(
                    Math.pow(rectCenterX - centerX, 2) + 
                    Math.pow(rectCenterY - centerY, 2)
                );
                const maxDistance = Math.sqrt(Math.pow(imageWidth, 2) + Math.pow(imageHeight, 2)) / 2;
                const centeringScore = 1 - (distanceFromCenter / maxDistance);
                score += centeringScore * 30; // Máximo 30 puntos
                
                // 3. Proporción (DNI/Pasaporte)
                const aspectRatio = rectangle.width / rectangle.height;
                const idealRatio = 1.6; // DNI ideal
                const ratioScore = 1 - Math.abs(aspectRatio - idealRatio) / idealRatio;
                score += ratioScore * 30; // Máximo 30 puntos
                
                return Math.max(0, Math.min(100, score));
            }
            
            checkPosition(rectangle, imageWidth, imageHeight) {
                const centerX = imageWidth / 2;
                const centerY = imageHeight / 2;
                const rectCenterX = rectangle.x + rectangle.width / 2;
                const rectCenterY = rectangle.y + rectangle.height / 2;
                
                const distanceFromCenter = Math.sqrt(
                    Math.pow(rectCenterX - centerX, 2) + 
                    Math.pow(rectCenterY - centerY, 2)
                );
                
                const maxDistance = Math.min(imageWidth, imageHeight) / 4;
                
                return {
                    centered: distanceFromCenter < maxDistance,
                    distance: distanceFromCenter
                };
            }
            
            checkAngle(rectangle) {
                // Simplificado - en realidad necesitarías detectar la rotación
                return {
                    isStraight: true, // Por ahora asumimos que está recto
                    angle: 0
                };
            }
            
            showDocumentDetected(document) {
                this.instructions.textContent = '¡DNI detectado! Presiona Capturar';
                this.instructions.className = 'instructions detected';
                this.captureBtn.disabled = false;
                this.guideFrame.classList.add('detected');
                
                // Actualizar indicadores con datos reales
                this.updateStatus('position', document.position.centered, 
                    document.position.centered ? 'Centrado' : 'Ajustar posición');
                this.updateStatus('angle', document.angle.isStraight, 
                    document.angle.isStraight ? 'Ángulo correcto' : 'Ajustar ángulo');
                
                console.log('Documento detectado:', {
                    confidence: document.confidence,
                    position: document.position,
                    angle: document.angle
                });
            }
            
            showNoDocument() {
                this.instructions.textContent = 'Coloca el DNI dentro del marco';
                this.instructions.className = 'instructions';
                this.captureBtn.disabled = true;
                this.guideFrame.classList.remove('detected');
                
                this.updateStatus('position', false, 'Ajustar');
                this.updateStatus('angle', false, 'Ajustar');
            }
            
            updateStatus(type, isGood, text) {
                const item = this.statusItems[type];
                if (item) {
                    item.style.borderColor = isGood ? '#4CAF50' : '#FF9800';
                    item.style.background = isGood ? 'rgba(76, 175, 80, 0.9)' : 'rgba(255, 152, 0, 0.9)';
                    item.querySelector('.text').textContent = text;
                }
            }
            
            async captureImage() {
                try {
                    console.log('Capturando imagen...');
                    this.captureBtn.disabled = true;
                    this.captureBtn.textContent = '📸 Procesando...';
                    
                    // Usar el canvas existente para capturar
                    const canvas = document.getElementById('captureCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    canvas.width = this.video.videoWidth;
                    canvas.height = this.video.videoHeight;
                    
                    // Capturar imagen normal (sin transformación)
                    ctx.drawImage(this.video, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = canvas.toDataURL('image/jpeg', 0.9);
                    
                    console.log('Imagen capturada (normal):', imageData.substring(0, 50) + '...');
                    
                    // Mostrar preview de la imagen capturada
                    this.showCapturedImagePreview(imageData);
                    
                    // Simular procesamiento
                    setTimeout(() => {
                        alert('¡Imagen capturada correctamente!\n\nLa imagen está en orientación normal.\n\nEn una implementación real, aquí se enviaría a tu IA para procesar el DNI.');
                        this.captureBtn.disabled = false;
                        this.captureBtn.textContent = '📸 Capturar';
                    }, 2000);
                    
                } catch (error) {
                    console.error('Error capturando imagen:', error);
                    this.showError('Error al capturar imagen');
                    this.captureBtn.disabled = false;
                    this.captureBtn.textContent = '📸 Capturar';
                }
            }
            
            showCapturedImagePreview(imageData) {
                // Crear un modal para mostrar la imagen capturada
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0,0,0,0.9);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    z-index: 1000;
                `;
                
                const img = document.createElement('img');
                img.src = imageData;
                img.style.cssText = `
                    max-width: 90%;
                    max-height: 90%;
                    border: 2px solid white;
                    border-radius: 10px;
                `;
                
                const closeBtn = document.createElement('button');
                closeBtn.textContent = '✕ Cerrar';
                closeBtn.style.cssText = `
                    position: absolute;
                    top: 20px;
                    right: 20px;
                    background: #ff4444;
                    color: white;
                    border: none;
                    padding: 10px 20px;
                    border-radius: 5px;
                    cursor: pointer;
                    font-size: 16px;
                `;
                
                closeBtn.onclick = () => {
                    document.body.removeChild(modal);
                };
                
                modal.appendChild(img);
                modal.appendChild(closeBtn);
                document.body.appendChild(modal);
                
                // Auto-cerrar después de 3 segundos
                setTimeout(() => {
                    if (document.body.contains(modal)) {
                        document.body.removeChild(modal);
                    }
                }, 3000);
            }
            
            async flipCamera() {
                try {
                    this.currentFacingMode = this.currentFacingMode === 'environment' ? 'user' : 'environment';
                    console.log('Cambiando a cámara:', this.currentFacingMode);
                    
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                    }
                    
                    await this.initializeCamera();
                    
                } catch (error) {
                    console.error('Error cambiando cámara:', error);
                    this.showError('Error al cambiar cámara');
                }
            }
            
            showError(message) {
                alert(`Error: ${message}`);
            }
            
            setDocumentType(type) {
                this.currentDocumentType = type;
                
                // Actualizar botones
                this.dniBtn.classList.toggle('active', type === 'dni');
                this.passportBtn.classList.toggle('active', type === 'passport');
                
                // Actualizar contenedor según el tipo
                const cameraContainer = document.querySelector('.camera-container');
                const guideFrame = document.querySelector('.guide-frame');
                
                if (type === 'dni') {
                    // DNI: 85.6mm x 53.98mm = 1.586:1
                    cameraContainer.style.width = '300px'; // Ligeramente más pequeño
                    cameraContainer.style.height = '189px'; // 300 / 1.586 = 189px
                    guideFrame.style.width = '270px';
                    guideFrame.style.height = '170px'; // 270 / 1.586 = 170px
                    this.instructions.textContent = 'Coloca el DNI dentro del marco';
                } else {
                    // Pasaporte: 88mm x 125mm = 0.704:1
                    cameraContainer.style.width = '200px'; // Más pequeño para móvil
                    cameraContainer.style.height = '284px'; // 200 / 0.704 = 284px
                    guideFrame.style.width = '180px';
                    guideFrame.style.height = '256px'; // 180 / 0.704 = 256px
                    this.instructions.textContent = 'Coloca el pasaporte dentro del marco';
                }
                
                console.log(`Tipo de documento cambiado a: ${type}`);
            }
            
            handleOrientationChange() {
                console.log('Cambio de orientación detectado');
                
                // Obtener orientación actual
                const orientation = screen.orientation ? screen.orientation.angle : window.orientation;
                const isLandscape = Math.abs(orientation) === 90;
                
                console.log('Orientación:', orientation, 'Landscape:', isLandscape);
                
                // Ajustar contenedor según orientación
                const cameraContainer = document.querySelector('.camera-container');
                if (cameraContainer) {
                    if (isLandscape) {
                        // Modo horizontal - contenedor más ancho
                        cameraContainer.style.width = '400px';
                        cameraContainer.style.height = '120px';
                    } else {
                        // Modo vertical - contenedor más alto
                        cameraContainer.style.width = '300px';
                        cameraContainer.style.height = '120px';
                    }
                }
                
                // Ajustar marco de guía
                const guideFrame = document.querySelector('.guide-frame');
                if (guideFrame) {
                    if (isLandscape) {
                        guideFrame.style.width = '360px';
                        guideFrame.style.height = '108px';
                    } else {
                        guideFrame.style.width = '270px';
                        guideFrame.style.height = '108px';
                    }
                }
            }
        }
        
        // Inicializar cuando se carga la página
        document.addEventListener('DOMContentLoaded', () => {
            const scanner = new SimpleDNIScanner();
            scanner.initialize();
        });
    </script>
</body>
</html>
